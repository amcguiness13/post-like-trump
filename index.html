    body { background: #0f0000; font-family: 'Inter', sans-serif; margin: 0; }

    @keyframes ticker-scroll {

    @keyframes gold-glow {

    }
    .gold-glow { animation: gold-glow 1.2s ease-in-out infinite; }

    @keyframes text-glow {
      0%,100% { text-shadow: 0 0 6px #FFD700; }
      50%      { text-shadow: 0 0 18px #FFD700, 0 0 36px rgba(255,215,0,.55); }

    .text-glow { animation: text-glow 1.2s ease-in-out infinite; }

    @keyframes shake {
      0%,100%{transform:translate(0,0) rotate(0deg)}

      40%{transform:translate(3px,1px) rotate(.4deg)}
      60%{transform:translate(-2px,1px) rotate(-.25deg)}
      80%{transform:translate(2px,-1px) rotate(.25deg)}

    @keyframes screen-flash {
      0%{opacity:0} 5%{opacity:.85} 18%{opacity:0} 42%{opacity:.55} 58%{opacity:0} 100%{opacity:0}

    }

      30% {transform:translateY(-3px) rotate(9deg) scale(0.94);}
      45% {transform:translateY(-28px) rotate(-7deg) scale(1.14);}

<body class="min-h-screen text-white">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────

const TOPICS = [
  "The Fake News Media",
  "A political rival",
  "A massive personal victory",
  "The rigged election",
  "China",
  "Wall Street",
  "A celebrity who disrespected you",
  "Your incredible poll numbers",
  "The Deep State",
  "A sporting event you attended",
  "Your net worth",
  "A country that owes you a favour",
  "Social media censorship",
  "The economy (which you built)",
  "Someone who was disloyal to you",
];

const DIMENSIONS = [
  { key: 'vocabulary',     label: 'Vocabulary'     },
  { key: 'capitalization', label: 'Capitalization'  },
  { key: 'punctuation',    label: 'Punctuation'     },
  { key: 'self_reference', label: 'Self-Reference'  },
  { key: 'enemy_framing',  label: 'Enemy Framing'   },
  { key: 'grievance_tone', label: 'Grievance Tone'  },
  { key: 'call_to_action', label: 'Call to Action'  },
  { key: 'structure',      label: 'Structure'       },
];

const TITLE_TIERS = [
  [100, 100, "THE REAL DONALD"],
  [81,   99, "Genius-Level"],
  [61,   80, "Very Stable"],
  [41,   60, "Rally Ready"],
  [21,   40, "MAGA Curious"],
  [0,    20, "Intern"],
];


// ─────────────────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────────────────

function getTitle(rating) {
  for (const [min, max, title] of TITLE_TIERS) {
    if (rating >= min && rating <= max) return title;
  }
  return "Intern";
}

function getTier(score) {
  if (score <= 20) return 1;
  if (score <= 40) return 2;
  if (score <= 60) return 3;
  if (score <= 80) return 4;
  if (score <= 99) return 5;
  return 6;
}

function calcCumulative(scores) {
  if (!scores.length) return 0;
  return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
}

function randomTopic() {
  return TOPICS[Math.floor(Math.random() * TOPICS.length)];
}

function loadState() {
  try {
    return {
      scores:       JSON.parse(localStorage.getItem('plt_scores') || '[]'),
      personalBest: parseFloat(localStorage.getItem('plt_best')   || '0'),
    };
  } catch {
    return { scores: [], personalBest: 0 };
  }
}

function saveState(scores, best) {
  localStorage.setItem('plt_scores', JSON.stringify(scores));
  localStorage.setItem('plt_best',   String(best));
}

// ─────────────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────────────

async function callJudge(postText) {
  const response = await fetch('/api/score', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ postText }),
  });

  if (!response.ok) {
    const data = await response.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${response.status}`);
  }

  return response.json();
}

// ─────────────────────────────────────────────────────────────────────────────
// SOUND
// ─────────────────────────────────────────────────────────────────────────────

function makeTone(ctx, type, freqFrom, freqTo, startAt, dur, vol) {
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.connect(g);
  g.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freqFrom, ctx.currentTime + startAt);
  osc.frequency.exponentialRampToValueAtTime(freqTo, ctx.currentTime + startAt + dur * 0.5);
  osc.frequency.exponentialRampToValueAtTime(freqFrom, ctx.currentTime + startAt + dur);
  g.gain.setValueAtTime(vol, ctx.currentTime + startAt);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startAt + dur);
  osc.start(ctx.currentTime + startAt);
  osc.stop(ctx.currentTime + startAt + dur + 0.01);
}

function playSirenT5() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) makeTone(ctx, 'sawtooth', 880, 440, i * 0.8, 0.75, 0.14);
  } catch(e) {}
}

function playSirenT6() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 6; i++) makeTone(ctx, 'sawtooth', 1200, 600, i * 0.48, 0.44, 0.18);
    for (let i = 0; i < 10; i++) {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'square'; osc.frequency.value = 1100;
      const s = ctx.currentTime + i * 0.3;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(0.1, s + 0.04);
      g.gain.linearRampToValueAtTime(0, s + 0.18);
      osc.start(s); osc.stop(s + 0.22);
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORE BAR
// ─────────────────────────────────────────────────────────────────────────────

function ScoreBar({ label, value, idx }) {
  const [w, setW] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setW(value), 80 + idx * 90);
    return () => clearTimeout(t);
  }, [value, idx]);

  const hue   = Math.round(value * 0.25);       // 0 → red, 25 → orange-red
  const color = `hsl(${hue}, 88%, 48%)`;
  const glow  = `hsl(${hue + 12}, 88%, 60%)`;

  return (
    <div className="flex items-center gap-2">
      <div className="w-28 text-right text-xs text-gray-400 shrink-0 font-semibold">{label}</div>
      <div className="flex-1 rounded-full overflow-hidden" style={{ background: '#2d0000', height: 13 }}>
        <div style={{
          width:      `${w}%`,
          height:     13,
          background: `linear-gradient(90deg, ${color}, ${glow})`,
          borderRadius: 9999,
          transition: 'width 0.75s cubic-bezier(0.4,0,0.2,1)',
        }} />
      </div>
      <div className="w-8 text-xs font-bold text-gray-300 shrink-0">{value}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TRUMP-O-METER  (animated SVG gauge)
// ─────────────────────────────────────────────────────────────────────────────

function TrumpOMeter({ score }) {
  const [disp, setDisp] = useState(0);
  const R    = 76;
  const CIRC = 2 * Math.PI * R;
  const rafRef = useRef(null);

  useEffect(() => {
    let start = null;
    const target = score;

    function step(ts) {
      if (!start) start = ts;
      const p    = Math.min((ts - start) / 1300, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setDisp(Math.round(ease * target));
      if (p < 1) rafRef.current = requestAnimationFrame(step);
    }

    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [score]);

  const offset  = CIRC * (1 - disp / 100);
  const color   = disp >= 80 ? '#FFD700' : disp >= 60 ? '#FF4500' : disp >= 40 ? '#FF8C00' : '#CC0000';

  return (
    <svg width="180" height="180" viewBox="0 0 180 180">
      {/* track */}
      <circle cx="90" cy="90" r={R} fill="none" stroke="#2d0000" strokeWidth="15"
        strokeDasharray={CIRC} strokeDashoffset="0" transform="rotate(-90 90 90)" />
      {/* filled arc */}
      <circle cx="90" cy="90" r={R} fill="none" stroke={color} strokeWidth="15"
        strokeDasharray={CIRC} strokeDashoffset={offset}
        strokeLinecap="round" transform="rotate(-90 90 90)"
        style={{ transition: 'stroke 0.45s' }} />
      {/* score number */}
      <text x="90" y="86" textAnchor="middle" fill={color}
        fontSize="46" fontFamily="'Bebas Neue',Impact,sans-serif">{disp}</text>
      <text x="90" y="109" textAnchor="middle" fill="#555"
        fontSize="11" fontFamily="Inter,sans-serif" letterSpacing="2.5">TRUMP SCORE</text>
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TICKER
// ─────────────────────────────────────────────────────────────────────────────

function Ticker({ items, bg, speed = 28 }) {
  // Double the items so the -50% translateX creates a seamless loop
  const doubled = [...items, ...items].join('   •   ');
  return (
    <div className="overflow-hidden" style={{ background: bg }}>
      <div className="ticker-anim py-1 px-8 hf tracking-wider text-white text-sm"
           style={{ animationDuration: `${speed}s` }}>
        {doubled}
      </div>
    </div>
  );
}

function LeaderboardModal({ onClose }) {
  const [entries,  setEntries]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [expanded, setExpanded] = useState(new Set());

  function toggleExpand(id) {
    setExpanded(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  useEffect(() => {
    fetch('/api/leaderboard')
      .then(r => r.json())
      .then(data => { setEntries(data); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  function timeAgo(str) {
    if (!str) return '';
    const diff = Date.now() - new Date(str + 'Z').getTime();
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins  < 1)   return 'just now';
    if (mins  < 60)  return `${mins}m ago`;
    if (hours < 24)  return `${hours}h ago`;
    return `${days}d ago`;
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         style={{ background: 'rgba(0,0,0,0.88)' }}
         onClick={onClose}>
      <div className="w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl flex flex-col"
           style={{ background: '#1a0000', border: '3px solid #FFD700', maxHeight: '90vh' }}
           onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div className="px-5 py-4 flex items-center justify-between shrink-0"
             style={{ background: 'linear-gradient(90deg,#78350f,#92400e)', borderBottom: '2px solid #FFD700' }}>
          <div>
            <span className="hf text-3xl tracking-widest" style={{ color: '#FFD700' }}>
              🏆 LEADERBOARD
            </span>
            <div className="text-xs mt-0.5" style={{ color: '#fbbf24' }}>Top 10 highest scoring posts — EVER</div>
          </div>
          <button onClick={onClose}
                  className="text-gray-400 hover:text-white text-2xl leading-none font-bold"
                  style={{ cursor: 'pointer' }}>✕</button>
        </div>

        {/* Entries */}
        <div className="overflow-y-auto flex-1 p-3 space-y-2">
          {loading && (
            <div className="flex justify-center py-8 gap-2">
              {[0,1,2].map(i => (
                <div key={i} className="w-2.5 h-2.5 rounded-full animate-bounce"
                     style={{ background: '#FFD700', animationDelay: `${i*0.15}s` }} />
              ))}
            </div>
          )}

          {!loading && entries.length === 0 && (
            <div className="text-center py-10 space-y-2">
              <div className="text-4xl">🎯</div>
              <div className="hf text-xl tracking-widest" style={{ color: '#555' }}>NO ENTRIES YET</div>
              <div className="text-xs text-gray-600">Be the first to claim the top spot!</div>
            </div>
          )}

          {entries.map((e, i) => {
            const style    = RANK_STYLES[i] || null;
            const isOpen   = expanded.has(e.id);
            const isLong   = e.post_text.length > 80;
            return (
              <div key={e.id} className="rounded-xl overflow-hidden"
                   style={{ background: style ? style.bg : '#0f0000', border: `1px solid ${style ? style.color : '#2d0000'}` }}>
                <div className="flex items-start gap-3 px-4 py-2.5">
                  <div className="shrink-0 text-center pt-0.5" style={{ minWidth: 36 }}>
                    {style
                      ? <span className="text-2xl">{style.medal}</span>
                      : <span className="hf text-xl" style={{ color: '#444' }}>#{i + 1}</span>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="font-black text-sm text-white truncate">{e.name}</span>
                      {e.topic && (
                        <span className="text-xs px-2 py-0.5 rounded-full shrink-0"
                              style={{ background: '#2d0000', color: '#666' }}>
                          {e.topic}
                        </span>
                      )}
                    </div>
                    <p className="text-xs leading-relaxed whitespace-pre-wrap"
                       style={{ color: style ? '#e5e7eb' : '#555' }}>
                      "{isOpen || !isLong ? e.post_text : e.post_text.slice(0, 80) + '…'}"
                    </p>
                    {isLong && (
                      <button
                        onClick={() => toggleExpand(e.id)}
                        className="text-xs mt-1 transition-colors"
                        style={{ color: style ? style.color : '#CC0000', cursor: 'pointer' }}
                      >
                        {isOpen ? '▲ Show less' : '▼ Read full post'}
                      </button>
                    )}
                  </div>
                  <div className="shrink-0 text-right">
                    <div className="hf text-2xl leading-none" style={{ color: style ? style.color : '#CC0000' }}>
                      {e.score}
                    </div>
                    <div className="text-xs" style={{ color: '#555' }}>{timeAgo(e.created_at)}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// NAME PROMPT  (shown when user qualifies for leaderboard)

function NamePrompt({ score, postText, topic, onSubmit, onSkip }) {
  const [name, setName] = useState('');
  const [saving, setSaving] = useState(false);

  async function handleSubmit() {
    if (!name.trim()) return;
    setSaving(true);
    try {
      await fetch('/api/leaderboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), score, post_text: postText, topic }),
      });
      onSubmit(name.trim());
    } catch (e) {
      onSubmit(name.trim());
    }
  }

  return (
    <div className="rounded-2xl overflow-hidden slide-up"
         style={{ border: '2px solid #FFD700', background: '#1a0000' }}>
      <div className="px-4 py-3 flex items-center gap-2"
           style={{ background: 'linear-gradient(90deg,#78350f,#92400e)' }}>
        <span className="hf text-xl tracking-widest" style={{ color: '#FFD700' }}>
          🏆 YOU'RE IN THE TOP 10!
        </span>
      </div>
      <div className="p-4 space-y-3">
        <p className="text-sm text-gray-400">
          Your score of <span className="font-black text-white">{score}/100</span> qualifies for the leaderboard.
          Enter your name to claim your spot!
        </p>
        <div className="flex gap-2">
          <input
            value={name}
            onChange={e => setName(e.target.value.slice(0, 30))}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="Your name…"
            className="flex-1 px-3 py-2 rounded-lg text-sm font-bold text-gray-900 outline-none"
            style={{ background: 'white' }}
            autoFocus
          />
          <button
            onClick={handleSubmit}
            disabled={!name.trim() || saving}
            className="hf text-lg tracking-widest px-4 py-2 rounded-lg"
            style={{ background: name.trim() && !saving ? '#FFD700' : '#555', color: '#0f0000', cursor: name.trim() && !saving ? 'pointer' : 'not-allowed' }}
          >
            {saving ? '…' : 'CLAIM'}
          </button>
        </div>
        <button onClick={onSkip} className="text-xs w-full text-center transition-colors"
                style={{ color: '#333', cursor: 'pointer' }}
                onMouseEnter={e => e.target.style.color = '#666'}
                onMouseLeave={e => e.target.style.color = '#333'}>
          Skip — I prefer to remain anonymous
        </button>
      </div>
    </div>
  );
}

function TrumpPostsModal({ onClose }) {
  const [posts,   setPosts]   = useState([]);
  const [offset,  setOffset]  = useState(0);
  const [loading, setLoading] = useState(false);
  const [done,    setDone]    = useState(false);
  const LIMIT = 20;

  async function loadMore(off) {
    setLoading(true);
    try {
      const res  = await fetch(`/api/posts?limit=${LIMIT}&offset=${off}`);
      const data = await res.json();
      setPosts(prev => off === 0 ? data : [...prev, ...data]);
      if (data.length < LIMIT) setDone(true);
      setOffset(off + LIMIT);
    } catch (e) {
      console.error(e);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadMore(0); }, []);

  function formatDate(str) {
    if (!str) return null;

  return (
    <div

             style={{ background: 'linear-gradient(90deg,#8B0000,#5a0000)', borderBottom: '2px solid #CC0000' }}>

          <button onClick={onClose}
                  className="text-gray-400 hover:text-white text-2xl leading-none font-bold"
                  style={{ cursor: 'pointer' }}>✕</button>
        </div>

        {/* Scrollable feed */}
        <div className="overflow-y-auto flex-1 p-3 space-y-3" style={{ background: '#e8e8e8' }}>
          {posts.map((p, i) => (
            <div key={p.id ?? i} className="rounded-2xl p-4 bg-white shadow"
                 style={{ border: '1px solid #e5e7eb' }}>
              {/* Profile row */}

function App() {
  const [phase,    setPhase]    = useState('compose');   // 'compose' | 'loading' | 'perfect' | 'results' | 'cheater'
  const [cheaterMsg, setCheaterMsg] = useState('');
  const [topic,    setTopic]    = useState(randomTopic);
  const [post,     setPost]     = useState('');
  const [result,   setResult]   = useState(null);
  const [error,    setError]    = useState(null);
  const [gs,       setGs]       = useState(loadState);  // { scores, personalBest }
  const [newTitle, setNewTitle] = useState(false);
  const [newRecord,setNewRecord]= useState(false);
  const [showLeaderboard,    setShowLeaderboard]    = useState(false);
  const [leaderboardQualifies, setLeaderboardQualifies] = useState(false);
  const [leaderboardSubmitted, setLeaderboardSubmitted] = useState(false);
  const prevTitleRef = useRef(getTitle(calcCumulative(loadState().scores)));

  const cumRating    = calcCumulative(gs.scores);
  const currentTitle = getTitle(cumRating);

  // Cheat code: type "judge100" to skip to 100%
  useEffect(() => {
    const seq = 'judge100'.split('');
    let pos = 0;
    function onKey(e) {
      if (e.key === seq[pos]) {
        pos++;
        if (pos === seq.length) { pos = 0; activateCheatCode(); }
      } else {
        pos = e.key === seq[0] ? 1 : 0;
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  function activateCheatCode() {
    const fake = {
      vocabulary: 100, capitalization: 100, punctuation: 100, self_reference: 100,
      enemy_framing: 100, grievance_tone: 100, call_to_action: 100, structure: 100,
      overall_score: 100,
      feedback: "PERFECT. Absolutely perfect. The best post ever written by anyone, ever, in the history of posting. Many people are saying it. I'm saying it. Everybody's saying it.",
      suggestions: [],
      breaking_news: {
        headline: "SOURCES CONFIRM: PERFECT TRUMP POST DETECTED — AI JUDGE WEEPS GOLDEN TEARS",
        body: "In an unprecedented event, the POST LIKE TRUMP AI Judge has awarded a perfect score for the first time in recorded history. Scientists are baffled. Enemies are devastated. The stock market is doing tremendously.",
        ticker: [
          "TRUMP SCORE INDEX HITS ALL-TIME HIGH — UP 10,000%",
          "Chuck Schumer seen crying in parking garage",
          "UN convenes emergency session in response to post",
          "Local man achieves perfect score, neighbours report unusual orange glow",
        ],
      },
    };
    setPost('(cheat code activated)');
    setResult(fake);
    const newScores = [...gs.scores, 100];
    const newBest   = 100;
    saveState(newScores, newBest);
    setGs({ scores: newScores, personalBest: newBest });
    setNewRecord(true);
    setPhase('perfect');
  }

  async function handleSubmit(postText) {
    setPost(postText);
    setError(null);
    setPhase('loading');

    let parsed = null;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        parsed = await callJudge(postText);
        if (parsed.cheater) {
          setCheaterMsg(parsed.message);
          setPhase('cheater');
          return;
        }
        break;
      } catch (err) {
        console.warn(`API attempt ${attempt + 1} failed:`, err);
        if (attempt === 1) {
          setError(`Error: ${err.message}`);
          setPhase('compose');
          return;
        }
        await new Promise(r => setTimeout(r, 800));
      }
    }

    const newScores = [...gs.scores, parsed.overall_score];
    const newBest   = Math.max(gs.personalBest, parsed.overall_score);
    saveState(newScores, newBest);

    const newCum      = calcCumulative(newScores);
    const newTitleVal = getTitle(newCum);
    const isRecord    = parsed.overall_score > gs.personalBest && gs.personalBest > 0;

    setGs({ scores: newScores, personalBest: newBest });
    setNewRecord(isRecord || gs.scores.length === 0 && parsed.overall_score > 0);

    if (newTitleVal !== prevTitleRef.current) {
      setNewTitle(true);
      prevTitleRef.current = newTitleVal;
      setTimeout(() => setNewTitle(false), 6000);
    }

    setResult(parsed);
    setLeaderboardSubmitted(false);

    // Check if score qualifies for top 10
    try {
      const lb = await fetch('/api/leaderboard').then(r => r.json());
      const qualifies = lb.length < 10 || parsed.overall_score > lb[lb.length - 1].score;
      setLeaderboardQualifies(qualifies);
    } catch (e) {
      setLeaderboardQualifies(false);
    }

    setPhase(parsed.overall_score === 100 ? 'perfect' : 'results');
  }

  function handleNext() {
    setTopic(randomTopic());
    setResult(null);
    setNewRecord(false);
    setError(null);
    setCheaterMsg('');
    setLeaderboardQualifies(false);
    setLeaderboardSubmitted(false);
    setPhase('compose');
  }

  return (
    <div className="min-h-screen" style={{ background: '#0f0000' }}>
      {showLeaderboard && <LeaderboardModal onClose={() => setShowLeaderboard(false)} />}

      <Header rating={cumRating} title={currentTitle} newTitle={newTitle}
              onShowLeaderboard={() => setShowLeaderboard(true)} />

      {error && (
        <div className="max-w-2xl mx-auto px-4 py-3">
          <div className="rounded-xl px-4 py-3 text-center hf text-xl tracking-widest border"
               style={{ background: '#7f1d1d', borderColor: '#CC0000', color: 'white' }}>
            🚨 {error} 🚨
            <button
              onClick={() => setError(null)}
              className="ml-4 text-sm font-sans font-normal opacity-60 hover:opacity-100"
            >
              ✕
            </button>
          </div>
        </div>
      )}

      {phase === 'cheater' && (
        <CheaterScreen message={cheaterMsg} onTryAgain={handleNext} />
      )}

      {phase === 'compose' && (
        <Composer topic={topic} onSubmit={handleSubmit} />
      )}

      {phase === 'loading' && <LoadingScreen />}

      {phase === 'perfect' && (
        <PerfectScoreScreen onContinue={() => setPhase('results')} />
      )}

      {phase === 'results' && result && (
        <Results
          result={result}
          topic={topic}
          post={post}
          personalBest={gs.personalBest}
          isNewRecord={newRecord}
          onNext={handleNext}
          leaderboardQualifies={leaderboardQualifies}
          leaderboardSubmitted={leaderboardSubmitted}
          onLeaderboardSubmit={name => setLeaderboardSubmitted(true)}
          onLeaderboardSkip={() => setLeaderboardSubmitted(true)}
        />
      )}

      {/* Footer */}
      <div className="text-center py-6 space-y-3">
        {/* Buy Me a Coffee */}
        <div>
          <a
            href="https://buymeacoffee.com/trumpjudge"
            target="_blank"
            rel="noopener noreferrer"
            className="inline-flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all"
            style={{ background: '#FFDD00', color: '#000', cursor: 'pointer', textDecoration: 'none' }}
            onMouseEnter={e => e.currentTarget.style.background = '#FFE733'}
            onMouseLeave={e => e.currentTarget.style.background = '#FFDD00'}
          >
            ☕ Buy the AI Judge a coffee
          </a>
          <div className="text-xs mt-1.5" style={{ color: '#333' }}>
            Scoring 23,794 Truth Social posts is EXHAUSTING work. Believe me.
          </div>
        </div>

        <button
          onClick={() => {
            if (confirm('Reset all scores and personal best?')) {
              localStorage.removeItem('plt_scores');
              localStorage.removeItem('plt_best');
              setGs({ scores: [], personalBest: 0 });
              prevTitleRef.current = 'Intern';
              handleNext();
            }
          }}
          className="text-xs transition-colors"
          style={{ color: '#333' }}
          onMouseEnter={e => e.target.style.color = '#666'}
          onMouseLeave={e => e.target.style.color = '#333'}
        >
          Reset Scores
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
